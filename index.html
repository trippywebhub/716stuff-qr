<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#716STUFF • Support</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(180deg, #001f3f 0%, #0d0d0d 60%);
        color: #ffffff;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
        padding: 20px;
    }

    .logo {
        width: 260px;
        margin: 20px auto 30px auto;
        display: block;
    }

    .glow {
        text-shadow:
            0 0 8px #0055ff,
            0 0 16px #0055ff,
            0 0 24px #ff1a1a,
            0 0 32px #ff1a1a;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 10px;
        font-weight: 700;
    }

    p.subtitle {
        font-size: 16px;
        color: #cccccc;
        margin-bottom: 40px;
    }

    .block {
        background: #1a1a1a;
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 20px;
        flex-wrap: wrap;
        justify-content: center;
        box-shadow: 0 0 12px rgba(0,85,255,0.3);
    }

    .qr {
        width: 180px;
        height: 180px;
        border-radius: 8px;
        background: #000;
        object-fit: contain;
    }

    .info {
        text-align: left;
        max-width: 300px;
    }

    .info h2 {
        margin: 0 0 8px 0;
        font-size: 22px;
    }

    .info a {
        color: #4da6ff;
        font-size: 16px;
        text-decoration: none;
    }

    .info a:hover {
        text-decoration: underline;
    }

    footer {
        margin-top: 50px;
        color: #ccc;
        font-size: 15px;
    }

    footer img {
        height: 22px;
        vertical-align: middle;
        margin-right: 6px;
    }
</style>
</head>

<body>

<div class="container">

    <!-- Buffalo Logo -->
    <img src="buffalo.png" class="logo glow" alt="#716STUFF Logo">

    <h1>Support / Tips</h1>
    <p class="subtitle">Scan any QR code or tap the link below it.</p>

    <!-- Venmo -->
    <div class="block">
        <img src="venmo.png" class="qr" alt="Venmo QR">
        <div class="info">
            <h2><img src="venmologo.png" style="height:22px;vertical-align:middle;margin-right:6px;"> Venmo @trippyweb</h2>
            <a href="https://venmo.com/trippyweb" target="_blank">Open Venmo</a>
        </div>
    </div>

    <!-- Cash App -->
    <div class="block">
        <img src="cashapp.png" class="qr" alt="Cash App QR">
        <div class="info">
            <h2><img src="cashapplogo.png" style="height:22px;vertical-align:middle;margin-right:6px;"> Cash App $trippyweb</h2>
            <a href="https://cash.app/$trippyweb" target="_blank">Open Cash App</a>
        </div>
    </div>

    <!-- PayPal -->
    <div class="block">
        <img src="paypal.png" class="qr" alt="PayPal QR">
        <div class="info">
            <h2><img src="paypallogo.png" style="height:22px;vertical-align:middle;margin-right:6px;"> PayPal trippyfam</h2>
            <a href="https://paypal.me/trippyfam" target="_blank">Open PayPal</a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <img src="coffee.png" alt="Coffee Icon"> Buy me a coffee ;) — #716STUFF
    </footer>

</div>

</body>
</html>
